<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="_ds/trycast-design-system-a0f4ea97-0d6d-4fdd-ac49-400152185bc0/tokens/fonts.css">
  <link rel="stylesheet" href="_ds/trycast-design-system-a0f4ea97-0d6d-4fdd-ac49-400152185bc0/tokens/colors.css">
  <link rel="stylesheet" href="_ds/trycast-design-system-a0f4ea97-0d6d-4fdd-ac49-400152185bc0/tokens/typography.css">
  <link rel="stylesheet" href="_ds/trycast-design-system-a0f4ea97-0d6d-4fdd-ac49-400152185bc0/tokens/spacing.css">
  <link rel="stylesheet" href="_ds/trycast-design-system-a0f4ea97-0d6d-4fdd-ac49-400152185bc0/styles.css">
  <script src="_ds/trycast-design-system-a0f4ea97-0d6d-4fdd-ac49-400152185bc0/_ds_bundle.js"></script>
  <style>
    * { box-sizing: border-box; }
    a { color: var(--text-muted); text-decoration: underline; text-underline-offset: 2px; }
    a:hover { color: var(--text); }
    @keyframes tc-social-spin { to { transform: rotate(360deg); } }
    /* Explicit light reset: the DS only defines light at :root, so a wrapper
       marked data-theme="light" inside a dark host (editor dark mode) would
       otherwise inherit dark tokens. This pins light values on the wrapper. */
    [data-theme="light"] {
      --bg: var(--cream);
      --surface: var(--cream-100);
      --surface-sunken: var(--cream-200);
      --border: var(--cream-200);
      --border-strong: #D8CEB8;
      --text: var(--ink-900);
      --text-muted: var(--ink-600);
      --text-faint: var(--ink-400);
      --brand: var(--green-800);
      --on-brand: var(--cream);
      --accent: var(--grenat-500);
      --accent-hover: var(--grenat-400);
      --accent-press: var(--grenat-600);
      --on-accent: var(--cream);
      --focus-ring: var(--grenat-500);
      --shadow-sm: 0 1px 2px rgba(22, 19, 14, 0.06);
      --shadow-md: 0 4px 14px rgba(22, 19, 14, 0.08);
      --shadow-lg: 0 12px 32px rgba(22, 19, 14, 0.12);
    }
  </style>
</helmet>
<div data-theme="{{ theme }}" style="width: 390px; font-family: var(--font-body); background: var(--bg); color: var(--text); border-radius: 46px; box-shadow: var(--shadow-lg); border: 1px solid var(--border); overflow: hidden;">

  <!-- Status bar -->
  <div style="display: flex; justify-content: space-between; align-items: center; padding: 14px 30px 0; font-size: 13px; font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums;">
    <span>9:41</span>
    <span style="display: flex; gap: 7px; align-items: center;">
      <svg width="17" height="11" viewBox="0 0 17 11" fill="currentColor"><rect x="0" y="7" width="3" height="4" rx="1"/><rect x="4.5" y="4.5" width="3" height="6.5" rx="1"/><rect x="9" y="2" width="3" height="9" rx="1"/><rect x="13.5" y="0" width="3" height="11" rx="1"/></svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><path d="M1 4.2C3 2.4 5.4 1.4 8 1.4s5 1 7 2.8"/><path d="M3.4 7C4.7 5.9 6.3 5.3 8 5.3s3.3.6 4.6 1.7"/><path d="M6 9.6c.6-.5 1.3-.8 2-.8s1.4.3 2 .8"/></svg>
      <svg width="26" height="12" viewBox="0 0 26 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3" stroke="currentColor" opacity="0.4"/><rect x="2" y="2" width="17" height="8" rx="1.5" fill="currentColor"/><rect x="23" y="4" width="2" height="4" rx="1" fill="currentColor" opacity="0.4"/></svg>
    </span>
  </div>

  <div style="padding: 20px 24px 30px; display: flex; flex-direction: column; gap: 20px;">

    <!-- 1 · Brand zone -->
    <div style="display: flex; flex-direction: column; align-items: center; gap: 10px; padding-top: 14px;">
      <svg width="66" height="66" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <g transform="rotate(-25 72 54)">
          <line x1="38" y1="54" x2="10" y2="54" stroke="#F06485" stroke-width="6" stroke-linecap="round"></line>
          <line x1="40" y1="43" x2="17" y2="43" stroke="#F06485" stroke-width="4" stroke-linecap="round" opacity="0.7"></line>
          <line x1="40" y1="65" x2="17" y2="65" stroke="#F06485" stroke-width="4" stroke-linecap="round" opacity="0.7"></line>
          <ellipse cx="72" cy="54" rx="30" ry="17" fill="#E63E63"></ellipse>
          <line x1="46" y1="54" x2="98" y2="54" stroke="#F1EBDD" stroke-width="2.4" stroke-linecap="round"></line>
          <line x1="56" y1="49.5" x2="56" y2="58.5" stroke="#F1EBDD" stroke-width="2" stroke-linecap="round"></line>
          <line x1="64" y1="48.5" x2="64" y2="59.5" stroke="#F1EBDD" stroke-width="2" stroke-linecap="round"></line>
          <line x1="72" y1="48" x2="72" y2="60" stroke="#F1EBDD" stroke-width="2" stroke-linecap="round"></line>
          <line x1="80" y1="48.5" x2="80" y2="59.5" stroke="#F1EBDD" stroke-width="2" stroke-linecap="round"></line>
          <line x1="88" y1="49.5" x2="88" y2="58.5" stroke="#F1EBDD" stroke-width="2" stroke-linecap="round"></line>
        </g>
      </svg>
      <div style="font-family: var(--font-display); font-size: 38px; letter-spacing: 0.5px; line-height: 0.9; color: var(--text);">TryCast</div>
      <div style="font-size: 14px; color: var(--text-muted); text-align: center; line-height: 1.4;">Pronostique le rugby avec tes potes.</div>
    </div>

    <!-- 2 · Segmented control (active tab = grenat spark) -->
    <div style="position: relative; display: grid; grid-template-columns: 1fr 1fr; gap: 2px; padding: 3px; height: 44px; background: var(--surface-sunken); border-radius: var(--radius-pill);">
      <span aria-hidden="true" style="position: absolute; top: 3px; bottom: 3px; left: {{ thumbLeft }}; width: calc(50% - 6px); background: var(--surface); border-radius: var(--radius-pill); box-shadow: var(--shadow-sm); transition: left var(--dur) var(--ease-out);"></span>
      <button type="button" onClick="{{ selectLogin }}" style="position: relative; z-index: 1; border: none; background: transparent; cursor: pointer; font-family: var(--font-body); font-weight: 600; font-size: 14px; color: {{ loginColor }}; -webkit-tap-highlight-color: transparent; transition: color var(--dur) var(--ease-out);">Connexion</button>
      <button type="button" onClick="{{ selectSignup }}" style="position: relative; z-index: 1; border: none; background: transparent; cursor: pointer; font-family: var(--font-body); font-weight: 600; font-size: 14px; color: {{ signupColor }}; -webkit-tap-highlight-color: transparent; transition: color var(--dur) var(--ease-out);">Inscription</button>
    </div>

    <!-- 3 · Social auth (Apple then Google) -->
    <div style="display: flex; flex-direction: column; gap: 10px;">
      <sc-if value="{{ isDark }}" hint-placeholder-val="{{ false }}">
        <button type="button" style="display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; height: 52px; border: none; border-radius: var(--radius-pill); background: #FFFFFF; color: #16130E; font-family: var(--font-body); font-weight: 600; font-size: 15px; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: transform var(--dur-fast) var(--ease-out);" style-active="transform: scale(0.98);">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09l.01-.01zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
          Continuer avec Apple
        </button>
      </sc-if>
      <sc-if value="{{ isLight }}" hint-placeholder-val="{{ true }}">
        <button type="button" style="display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; height: 52px; border: none; border-radius: var(--radius-pill); background: #000000; color: #FFFFFF; font-family: var(--font-body); font-weight: 600; font-size: 15px; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: transform var(--dur-fast) var(--ease-out);" style-active="transform: scale(0.98);">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09l.01-.01zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
          Continuer avec Apple
        </button>
      </sc-if>
      <button type="button" style="display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; height: 52px; border: 1.5px solid var(--border-strong); border-radius: var(--radius-pill); background: var(--surface); color: var(--text); font-family: var(--font-body); font-weight: 600; font-size: 15px; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: transform var(--dur-fast) var(--ease-out);" style-active="transform: scale(0.98);">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M23.52 12.27c0-.79-.07-1.54-.2-2.27H12v4.51h6.47a5.53 5.53 0 0 1-2.4 3.62v3h3.88c2.27-2.09 3.57-5.17 3.57-8.86z"/><path fill="#34A853" d="M12 24c3.24 0 5.96-1.08 7.95-2.91l-3.88-3c-1.08.72-2.45 1.16-4.07 1.16-3.13 0-5.78-2.11-6.73-4.96H1.29v3.09A12 12 0 0 0 12 24z"/><path fill="#FBBC05" d="M5.27 14.29a7.2 7.2 0 0 1 0-4.58V6.62H1.29a12 12 0 0 0 0 10.76z"/><path fill="#EA4335" d="M12 4.75c1.77 0 3.35.61 4.6 1.8l3.44-3.44A11.96 11.96 0 0 0 12 0 12 12 0 0 0 1.29 6.62l3.98 3.09C6.22 6.86 8.87 4.75 12 4.75z"/></svg>
        Continuer avec Google
      </button>
    </div>

    <!-- 4 · Separator -->
    <div style="display: flex; align-items: center; gap: 12px;">
      <span style="flex: 1; height: 1px; background: var(--border);"></span>
      <span style="font-size: 12px; font-weight: 500; color: var(--text-faint); text-transform: lowercase;">ou</span>
      <span style="flex: 1; height: 1px; background: var(--border);"></span>
    </div>

    <!-- 5 · Email path -->
    <sc-if value="{{ isSignup }}" hint-placeholder-val="{{ false }}">
      <div style="display: flex; flex-direction: column; gap: 14px;">
        <x-import component-from-global-scope="TryCastDesignSystem_a0f4ea.Input" label="Pseudo" placeholder="Ton pseudo dans la ligue" hint-size="100%,72px"></x-import>
        <x-import component-from-global-scope="TryCastDesignSystem_a0f4ea.Input" label="E-mail" type="email" placeholder="toi@exemple.fr" hint-size="100%,72px"></x-import>
        <x-import component-from-global-scope="TryCastDesignSystem_a0f4ea.Input" label="Mot de passe" type="password" placeholder="8 caractères minimum" hint-size="100%,72px"></x-import>
        <x-import component-from-global-scope="TryCastDesignSystem_a0f4ea.Input" label="Vérification du mot de passe" type="password" placeholder="Retape ton mot de passe" hint-size="100%,72px"></x-import>
        <div style="margin-top: 4px;">
          <x-import component-from-global-scope="TryCastDesignSystem_a0f4ea.Button" variant="primary" size="lg" full-width="{{ true }}" hint-size="100%,56px">Créer mon compte</x-import>
        </div>
      </div>
    </sc-if>
    <sc-if value="{{ isLogin }}" hint-placeholder-val="{{ true }}">
      <div style="display: flex; flex-direction: column; gap: 14px;">
        <x-import component-from-global-scope="TryCastDesignSystem_a0f4ea.Input" label="E-mail" type="email" placeholder="toi@exemple.fr" hint-size="100%,72px"></x-import>
        <x-import component-from-global-scope="TryCastDesignSystem_a0f4ea.Input" label="Mot de passe" type="password" placeholder="Ton mot de passe" hint-size="100%,72px"></x-import>
        <div style="display: flex; justify-content: flex-end; margin-top: -4px;">
          <a href="#" style="font-size: 13px; font-weight: 500; text-decoration: none; color: var(--text-muted);">Mot de passe oublié ?</a>
        </div>
        <div style="margin-top: 4px;">
          <x-import component-from-global-scope="TryCastDesignSystem_a0f4ea.Button" variant="primary" size="lg" full-width="{{ true }}" hint-size="100%,56px">Se connecter</x-import>
        </div>
      </div>
    </sc-if>

    <!-- 6 · Legal footer -->
    <div style="text-align: center; font-size: 12px; line-height: 1.5; color: var(--text-faint);">
      En continuant, tu acceptes nos <a href="#">CGU</a> et notre <a href="#">Politique de confidentialité</a>.
    </div>

  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:390,&quot;height&quot;:844},&quot;theme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;light&quot;,&quot;dark&quot;],&quot;default&quot;:&quot;light&quot;,&quot;tsType&quot;:&quot;'light' | 'dark'&quot;},&quot;initialMode&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;login&quot;,&quot;signup&quot;],&quot;default&quot;:&quot;login&quot;,&quot;tsType&quot;:&quot;'login' | 'signup'&quot;}}">
class Component extends DCLogic {
  state = { mode: null };

  renderVals() {
    const mode = this.state.mode || this.props.initialMode || 'login';
    const isSignup = mode === 'signup';
    const isDark = this.props.theme === 'dark';
    return {
      theme: this.props.theme || 'light',
      isDark,
      isLight: !isDark,
      isSignup,
      isLogin: !isSignup,
      thumbLeft: isSignup ? 'calc(50% + 3px)' : '3px',
      loginColor: !isSignup ? 'var(--accent)' : 'var(--text-faint)',
      signupColor: isSignup ? 'var(--accent)' : 'var(--text-faint)',
      selectLogin: () => this.setState({ mode: 'login' }),
      selectSignup: () => this.setState({ mode: 'signup' }),
    };
  }
}
</script>
</body>
</html>
